mutation UpdateIssueComment($comment_id: ID!, $body: String!) {
  updateIssueComment(input: {id: $comment_id, body: $body}) {
    clientMutationId
  }
}

mutation AddComment($pull_request_id: ID!, $body: String!) {
  addComment(input: {subjectId: $pull_request_id, body: $body}) {
    clientMutationId
  }
}

fragment PR on PullRequest {
  id
  number
  body
  title
  baseRefName
  headRefName
  closed
  merged
  comments(first: 100) {
    nodes {
      body
      id
      viewerCanUpdate
    }
  }
  assignees(first: 100) {
    nodes {
      id
      login
    }
  }
  # We don't quite know yet how to handle these. So only get one
  reviewRequests(first: 1) {
    nodes {
      id
    }
  }
}

query OldComments(
  $name: String!
  $owner: String!
  $number: Int!
) {
  repository(owner: $owner, name: $name) {
    pullRequest(number: $number) {
      ...PR
    }
  }
}

query ByHead(
  $name: String!
  $owner: String!
  $head: String!
) {
  repository(owner: $owner, name: $name) {
    pullRequests(headRefName: $head) {
      nodes {
        ...PR
      }
    }
  }
}

mutation UpdatePRBase($pull_request_id: ID!, $branch: String!) {
  updatePullRequest(input: {pullRequestId: $pull_request_id, baseRefName: $branch}) {
    clientMutationId
  }
}